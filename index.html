<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闽南侨批地图 · 海丝记忆</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cinzel:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', serif;
    background: #3e2f1c;
    overflow: hidden;
    height: 100vh;
    user-select: none;
  }

  /* ---- 航海罗盘装饰 ---- */
  .compass-rose {
    position: fixed;
    top: 28px;
    right: 28px;
    width: 100px;
    height: 100px;
    z-index: 1000;
    pointer-events: none;
    opacity: 0.75;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
  }
  .compass-rose svg { width: 100%; height: 100%; }

  /* ---- 地图容器 ---- */
  #map {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1;
  }

  /* 羊皮纸滤镜 */
  .parchment-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(210,180,140,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(139,90,43,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(180,145,100,0.08) 0%, transparent 70%);
  }

  /* 地图瓦片做旧 */
  #map .leaflet-tile {
    filter: sepia(0.55) saturate(0.7) brightness(1.05) contrast(0.9) hue-rotate(5deg);
  }
  #map .leaflet-tile-pane { opacity: 0.92; }

  /* ---- 侧边信息面板 ---- */
  .side-panel {
    position: fixed;
    left: 0; top: 0;
    width: 380px; height: 100%;
    z-index: 1000;
    background: linear-gradient(180deg,
      rgba(45,30,15,0.94) 0%,
      rgba(62,47,28,0.94) 30%,
      rgba(50,35,18,0.94) 100%
    );
    color: #e8d5b0;
    display: flex;
    flex-direction: column;
    border-right: 3px solid #8b7355;
    box-shadow: 8px 0 30px rgba(0,0,0,.6);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .side-panel.collapsed { transform: translateX(-380px); }

  .panel-toggle {
    position: absolute;
    right: -42px; top: 18px;
    width: 42px; height: 42px;
    background: rgba(45,30,15,0.92);
    border: 2px solid #8b7355;
    border-left: none;
    border-radius: 0 8px 8px 0;
    color: #d4b896;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    z-index: 10;
  }
  .panel-toggle:hover { background: rgba(62,47,28,0.95); }

  /* 面板头部 */
  .panel-header {
    padding: 26px 28px 16px;
    border-bottom: 2px solid #8b7355;
    position: relative;
  }
  .panel-header::after {
    content: '';
    position: absolute;
    bottom: -6px; left: 28px; right: 28px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c4a265, transparent);
  }
  .panel-header h1 {
    font-family: 'Cinzel', 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 3px;
    color: #d4b896;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,.5);
    line-height: 1.4;
  }
  .panel-header .subtitle {
    display: block;
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: #b8976e;
    margin-top: 4px;
  }
  .panel-header .nautical-divider {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px;
    color: #8b7355;
    font-size: 14px;
  }
  .nautical-divider .line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #8b7355, transparent);
  }

  /* 路线进度条 */
  .route-progress {
    padding: 14px 28px;
    border-bottom: 1px solid rgba(139,115,85,0.4);
    display: flex; align-items: center; gap: 10px;
  }
  .route-progress .dot { width: 10px; height: 10px; border-radius: 50%; background: #c4a265; flex-shrink: 0; }
  .route-progress .bar {
    flex: 1; height: 3px;
    background: linear-gradient(90deg, #c4a265, #8b7355);
    border-radius: 2px;
  }
  .route-progress span {
    font-size: 11px; color: #b8976e; white-space: nowrap;
    letter-spacing: 1px;
  }

  /* 地点列表 */
  .location-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .location-list::-webkit-scrollbar { width: 4px; }
  .location-list::-webkit-scrollbar-track { background: rgba(0,0,0,.2); }
  .location-list::-webkit-scrollbar-thumb { background: #8b7355; border-radius: 2px; }

  .loc-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.25s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .loc-item:hover { background: rgba(196,162,101,0.1); }
  .loc-item.active {
    background: rgba(196,162,101,0.15);
    border-left-color: #c4a265;
  }
  .loc-item .marker-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5a3e28, #3e2f1c);
    border: 2px solid #8b7355;
    color: #d4b896;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .loc-item.active .marker-num {
    background: linear-gradient(135deg, #8b6914, #5a3e28);
    border-color: #c4a265;
  }
  .loc-item .loc-info h3 {
    font-size: 15px; font-weight: 600; color: #e8d5b0;
    margin-bottom: 3px; letter-spacing: 1px;
  }
  .loc-item .loc-info .loc-era {
    font-size: 11px; color: #b8976e; letter-spacing: 1px;
  }
  .loc-item .loc-info .loc-desc {
    font-size: 12px; color: #a89070; margin-top: 4px; line-height: 1.5;
  }

  /* 底部图例 */
  .panel-footer {
    padding: 16px 28px;
    border-top: 1px solid rgba(139,115,85,0.4);
    font-size: 11px;
    color: #8b7355;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.6;
  }
  .panel-footer .ship-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* ---- 地图弹窗 ---- */
  .leaflet-popup-content-wrapper {
    background: rgba(45,30,15,0.94) !important;
    color: #e8d5b0 !important;
    border: 2px solid #8b7355 !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,.6) !important;
  }
  .leaflet-popup-tip { background: rgba(45,30,15,0.94) !important; }
  .leaflet-popup-content { font-family: 'Noto Serif SC', serif !important; margin: 12px 16px !important; }
  .leaflet-popup-content h3 { font-size: 16px; margin: 0 0 4px; color: #d4b896; }
  .leaflet-popup-content p { font-size: 12px; margin: 4px 0; color: #b8976e; }

  /* ---- 航行动画路线 ---- */
  .route-animated {
    stroke-dasharray: 12 8;
    animation: dashMove 1.5s linear infinite;
  }
  @keyframes dashMove {
    to { stroke-dashoffset: -40; }
  }

  /* ---- 响应式 ---- */
  @media (max-width: 768px) {
    .side-panel { width: 300px; }
    .side-panel.collapsed { transform: translateX(-300px); }
    .panel-header h1 { font-size: 20px; }
    .loc-item { padding: 10px 20px; }
    .compass-rose { width: 70px; height: 70px; top: 16px; right: 16px; }
  }
</style>
</head>
<body>

<!-- 航海罗盘 -->
<div class="compass-rose">
  <svg viewBox="0 0 120 120">
    <defs>
      <radialGradient id="compGrad" cx="50%" cy="45%">
        <stop offset="0%" stop-color="#d4b896"/>
        <stop offset="70%" stop-color="#c4a265"/>
        <stop offset="100%" stop-color="#8b6914"/>
      </radialGradient>
    </defs>
    <circle cx="60" cy="60" r="56" fill="none" stroke="url(#compGrad)" stroke-width="2"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#c4a265" stroke-width="0.8" opacity="0.5"/>
    <!-- 八个方位 -->
    <g fill="#d4b896" font-family="Cinzel,serif" font-size="11" text-anchor="middle">
      <text x="60" y="16" font-size="13" font-weight="bold" fill="#e8d5b0">N</text>
      <text x="60" y="110" opacity="0.6">S</text>
      <text x="110" y="64" opacity="0.6">E</text>
      <text x="10" y="64" opacity="0.6">W</text>
    </g>
    <!-- NE/NW/SE/SW 小标记 -->
    <g fill="#c4a265" font-family="Cinzel,serif" font-size="7" text-anchor="middle" opacity="0.5">
      <text x="97" y="25">NE</text>
      <text x="23" y="25">NW</text>
      <text x="97" y="103">SE</text>
      <text x="23" y="103">SW</text>
    </g>
    <!-- 指针 -->
    <polygon points="60,10 55,55 60,45 65,55" fill="#e8d5b0" opacity="0.9"/>
    <polygon points="60,110 55,65 60,75 65,65" fill="#8b6914" opacity="0.5"/>
    <circle cx="60" cy="60" r="6" fill="#3e2f1c" stroke="#c4a265" stroke-width="1.5"/>
  </svg>
</div>

<!-- 地图 -->
<div id="map"></div>
<div class="parchment-overlay"></div>

<!-- 侧边面板 -->
<div class="side-panel" id="sidePanel">
  <button class="panel-toggle" id="panelToggle" title="收起/展开">◀</button>

  <div class="panel-header">
    <h1>闽 南 侨 批 地 图<span class="subtitle">· QIAOPI MAP ·</span></h1>
    <div class="nautical-divider">
      <span class="line"></span><span>⚓</span><span class="line"></span>
    </div>
  </div>

  <div class="route-progress">
    <div class="dot"></div><div class="bar"></div>
    <span>海上丝绸之路 · 侨批记忆</span>
  </div>

  <div class="location-list" id="locationList"></div>

  <div class="panel-footer">
    <span class="ship-icon">⛵</span>
    天一总局 → 鼓浪屿 → 厦门 → 晋江<br>→ 石狮 → 泉州 → 南安<br>
    <span style="color:#b8976e">漳州 · 厦门 · 泉州</span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---- 地点数据 ----
const locations = [
  {
    id: 1,
    name: '天一总局',
    fullName: '天一信局总办事处',
    lat: 24.505, lng: 117.925,
    city: '漳州',
    area: '龙海角美流传村',
    era: '清光绪六年（1880年）',
    desc: '中国最早的侨批局，由郭有品创办。鼎盛时期在东南亚设有20多家分支机构，年处理侨汇超千万银元，被誉为"闽南侨批业鼻祖"。',
    icon: 'anchor'
  },
  {
    id: 2,
    name: '鼓浪屿华侨博物馆',
    fullName: '厦门华侨博物院',
    lat: 24.447, lng: 118.068,
    city: '厦门',
    area: '鼓浪屿',
    era: '1959年建馆',
    desc: '中国唯一的华侨历史专题博物馆，由陈嘉庚先生倡办。馆藏大量侨批实物、侨乡文物，全面展示华侨"下南洋"的艰辛历程与家国情怀。',
    icon: 'museum'
  },
  {
    id: 3,
    name: '厦门侨批展厅',
    fullName: '厦门市侨批文化展厅',
    lat: 24.455, lng: 118.087,
    city: '厦门',
    area: '思明区中山路',
    era: '专题展厅',
    desc: '集中展示闽南侨批的历史变迁，还原批局经营场景，藏有大量"水客"往来的珍贵信函，是了解侨批文化的重要窗口。',
    icon: 'letter'
  },
  {
    id: 4,
    name: '梧林传统村落',
    fullName: '晋江梧林古村落',
    lat: 24.775, lng: 118.585,
    city: '泉州',
    area: '晋江市新塘街道',
    era: '明清至今',
    desc: '闽南著名侨乡，保存完好的闽南古厝、番仔楼建筑群。一砖一瓦间尽是华侨下南洋、寄侨批、建家宅的动人故事。',
    icon: 'village'
  },
  {
    id: 5,
    name: '晋江侨批馆',
    fullName: '晋江市侨批文化展示馆',
    lat: 24.815, lng: 118.572,
    city: '泉州',
    area: '晋江市',
    era: '文化展馆',
    desc: '系统展示晋江作为全国著名侨乡的侨批文化，收藏大量侨批原件与批局经营史料，见证"十户九侨"的深厚侨乡底蕴。',
    icon: 'letter'
  },
  {
    id: 6,
    name: '永宁古卫城',
    fullName: '石狮永宁古卫城',
    lat: 24.682, lng: 118.725,
    city: '泉州',
    area: '石狮市永宁镇',
    era: '明洪武二十年（1387年）',
    desc: '东南沿海重要海防古城，也是闽南人"下南洋"的重要出海口。城内保留大量侨汇建造的番仔楼与侨批故事。',
    icon: 'fortress'
  },
  {
    id: 7,
    name: '王顺兴信局旧址',
    fullName: '王顺兴侨批信局',
    lat: 24.908, lng: 118.590,
    city: '泉州',
    area: '古城区域',
    era: '清末民初',
    desc: '泉州古城内保存最完整的侨批信局旧址，见证了泉州作为海上丝绸之路起点在侨批网络中的枢纽地位。',
    icon: 'anchor'
  },
  {
    id: 8,
    name: '泉州侨批馆',
    fullName: '泉州市侨批文化馆',
    lat: 24.912, lng: 118.587,
    city: '泉州',
    area: '泉州古城',
    era: '文化展馆',
    desc: '位于泉州古城区，集中展示泉州侨批文化的历史脉络。泉州是海上丝绸之路起点，侨批文化在此与海丝文化深度交融。',
    icon: 'museum'
  },
  {
    id: 9,
    name: '蔡氏古民居',
    fullName: '南安蔡氏古民居建筑群',
    lat: 24.952, lng: 118.455,
    city: '泉州',
    area: '南安市官桥镇',
    era: '清同治至宣统年间',
    desc: '闽南规模最大的华侨古民居群，由旅菲华侨蔡启昌、蔡资深父子兴建。十余座大厝连片而立，堪称侨批财富化作故土家园的宏伟见证。',
    icon: 'village'
  }
];

// ---- 自定义 SVG 图标 ----
function createIcon(type, num) {
  const colors = {
    anchor:   { fill: '#5a8a9a', stroke: '#d4b896' },
    museum:   { fill: '#8b6914', stroke: '#d4b896' },
    letter:   { fill: '#b87333', stroke: '#d4b896' },
    village:  { fill: '#6b8e5a', stroke: '#d4b896' },
    fortress: { fill: '#7a5a4a', stroke: '#d4b896' }
  };
  const c = colors[type] || colors.anchor;

  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 52" width="40" height="52">
      <defs>
        <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.4"/></filter>
      </defs>
      <g filter="url(#shadow)">
        <!-- 锚/标记底座 -->
        <circle cx="20" cy="28" r="16" fill="${c.fill}" stroke="${c.stroke}" stroke-width="2.5"/>
        <circle cx="20" cy="28" r="10" fill="none" stroke="${c.stroke}" stroke-width="0.8" opacity="0.5"/>
        <!-- 数字 -->
        <text x="20" y="32" text-anchor="middle" fill="#e8d5b0"
              font-family="Cinzel,serif" font-size="15" font-weight="bold">${num}</text>
        <!-- 上方绳索/锚杆 -->
        <line x1="20" y1="8" x2="20" y2="12" stroke="${c.stroke}" stroke-width="2"/>
        <circle cx="20" cy="6" r="3" fill="none" stroke="${c.stroke}" stroke-width="2"/>
      </g>
    </svg>`;

  const encoded = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  return L.icon({
    iconUrl: encoded,
    iconSize: [40, 52],
    iconAnchor: [20, 44],
    popupAnchor: [0, -42]
  });
}

// ---- 初始化地图 ----
const map = L.map('map', {
  center: [24.7, 118.25],
  zoom: 10,
  minZoom: 9,
  maxZoom: 16,
  zoomControl: false,
  attributionControl: false
});

// 使用柔色底图 + 羊皮纸滤镜
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

// 右上角缩放控件（位置避开罗盘）
L.control.zoom({ position: 'bottomright' }).addTo(map);

// ---- 绘制航线 ----
const routeCoords = locations.map(l => [l.lat, l.lng]);
const routeLine = L.polyline(routeCoords, {
  color: '#c4a265',
  weight: 3,
  dashArray: '14 8',
  opacity: 0.8,
  className: 'route-animated'
}).addTo(map);

// 航线外围虚线（航路带宽效果）
L.polyline(routeCoords, {
  color: '#8b7355',
  weight: 1,
  dashArray: '4 12',
  opacity: 0.4
}).addTo(map);

// 起始与终点标记
const startIcon = L.divIcon({
  className: '',
  html: '<div style="background:linear-gradient(135deg,#c4a265,#8b6914);color:#3e2f1c;padding:4px 10px;border-radius:12px;font-family:Cinzel,serif;font-size:12px;font-weight:bold;border:2px solid #e8d5b0;white-space:nowrap;text-align:center;">⚓ 起点</div>',
  iconSize: [0, 0],
  iconAnchor: [-35, 12]
});
const endIcon = L.divIcon({
  className: '',
  html: '<div style="background:linear-gradient(135deg,#8b6914,#5a3e28);color:#e8d5b0;padding:4px 10px;border-radius:12px;font-family:Cinzel,serif;font-size:12px;font-weight:bold;border:2px solid #c4a265;white-space:nowrap;text-align:center;">🏁 终点</div>',
  iconSize: [0, 0],
  iconAnchor: [-35, 12]
});
L.marker([locations[0].lat, locations[0].lng], { icon: startIcon }).addTo(map);
L.marker([locations[8].lat, locations[8].lng], { icon: endIcon }).addTo(map);

// ---- 添加标记点 ----
const markers = [];
locations.forEach((loc, i) => {
  const icon = createIcon(loc.icon, i + 1);
  const marker = L.marker([loc.lat, loc.lng], { icon })
    .bindPopup(`
      <h3>${loc.name}</h3>
      <p style="color:#c4a265;font-size:11px;">${loc.city} · ${loc.area}</p>
      <p style="font-size:11px;color:#8b7355;">${loc.era}</p>
      <p style="line-height:1.6;">${loc.desc}</p>
    `)
    .addTo(map);
  markers.push({ marker, loc, index: i });
});

// ---- 侧边栏地点列表 ----
const listEl = document.getElementById('locationList');
locations.forEach((loc, i) => {
  const div = document.createElement('div');
  div.className = 'loc-item';
  div.innerHTML = `
    <div class="marker-num">${i + 1}</div>
    <div class="loc-info">
      <h3>${loc.name}</h3>
      <div class="loc-era">${loc.city} · ${loc.area}</div>
      <div class="loc-desc">${loc.desc.substring(0, 52)}…</div>
    </div>`;
  div.addEventListener('click', () => {
    map.setView([loc.lat, loc.lng], 14, { animate: true });
    markers[i].marker.openPopup();
    setActiveItem(i);
  });
  listEl.appendChild(div);
});

function setActiveItem(idx) {
  document.querySelectorAll('.loc-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

// ---- 面板折叠 ----
const panel = document.getElementById('sidePanel');
const toggle = document.getElementById('panelToggle');
let panelOpen = true;

toggle.addEventListener('click', () => {
  panelOpen = !panelOpen;
  panel.classList.toggle('collapsed', !panelOpen);
  toggle.textContent = panelOpen ? '◀' : '▶';
  setTimeout(() => map.invalidateSize(), 400);
});

// ---- 键盘导航 ----
let currentIdx = 0;
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    currentIdx = Math.min(currentIdx + 1, locations.length - 1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    currentIdx = Math.max(currentIdx - 1, 0);
  } else return;

  const loc = locations[currentIdx];
  map.setView([loc.lat, loc.lng], 14, { animate: true });
  markers[currentIdx].marker.openPopup();
  setActiveItem(currentIdx);

  // 滚动列表可见
  const items = listEl.children;
  if (items[currentIdx]) items[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
});

// ---- 响应式适配 ----
window.addEventListener('resize', () => map.invalidateSize());

// ---- 初始自适应视图 ----
const bounds = L.latLngBounds(routeCoords);
map.fitBounds(bounds.pad(0.15));

console.log('⚓ 闽南侨批地图已就绪 · 9个站点 · 跨越漳厦泉');
</script>
</body>
