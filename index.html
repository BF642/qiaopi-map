<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闽南侨批地图 · 海丝记忆</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cinzel:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Serif SC', serif;
  background: #1a1208;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

/* ===== 噪声纹理 ===== */
.noise-layer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 3;
  opacity: 0.06;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

/* ===== 地图容器 ===== */
#map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
#map .leaflet-tile {
  filter: sepia(0.6) saturate(0.55) brightness(1.08) contrast(0.88) hue-rotate(8deg);
}
#map .leaflet-tile-pane { opacity: 0.9; }

.parchment-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
  background:
    radial-gradient(ellipse 60% 50% at 55% 45%, rgba(220,200,160,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 120% 100% at 50% 50%, transparent 40%, rgba(30,18,5,0.45) 100%),
    radial-gradient(ellipse 80px 60px at 18% 72%, rgba(139,90,43,0.12) 0%, transparent 100%),
    radial-gradient(ellipse 120px 80px at 75% 25%, rgba(139,90,43,0.10) 0%, transparent 100%),
    radial-gradient(ellipse 60px 90px at 62% 82%, rgba(160,110,50,0.08) 0%, transparent 100%),
    radial-gradient(ellipse 100px 50px at 28% 38%, rgba(139,90,43,0.07) 0%, transparent 100%);
}

.map-border {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 999;
  border: 8px solid transparent;
  border-image: linear-gradient(135deg,
    rgba(196,162,101,0.5) 0%, rgba(139,115,85,0.3) 25%,
    rgba(196,162,101,0.2) 50%, rgba(139,115,85,0.3) 75%,
    rgba(196,162,101,0.5) 100%) 1;
}

.corner-decor {
  position: fixed; pointer-events: none; z-index: 1001;
  width: 60px; height: 60px; opacity: 0.55;
}
.corner-decor svg { width: 100%; height: 100%; }
.corner-tl { top: 8px; left: 388px; }
.corner-tr { top: 8px; right: 8px; transform: scaleX(-1); }
.corner-bl { bottom: 8px; left: 388px; transform: scaleY(-1); }
.corner-br { bottom: 8px; right: 8px; transform: scale(-1,-1); }

/* ===== 航海罗盘 ===== */
.compass-rose {
  position: fixed; top: 20px; right: 20px;
  width: 110px; height: 110px; z-index: 1000;
  pointer-events: none;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,.55));
}
.compass-rose svg { width: 100%; height: 100%; animation: compassFloat 6s ease-in-out infinite; }
@keyframes compassFloat {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(1.5deg); }
  75% { transform: rotate(-1.5deg); }
}

/* ===== 侧边面板 ===== */
.side-panel {
  position: fixed; left: 0; top: 0;
  width: 380px; height: 100%;
  z-index: 1000;
  background: linear-gradient(180deg,
    rgba(35,22,10,0.96) 0%, rgba(50,35,18,0.96) 30%, rgba(40,25,12,0.96) 100%);
  color: #e8d5b0;
  display: flex; flex-direction: column;
  border-right: 2px solid rgba(196,162,101,0.35);
  box-shadow: 8px 0 40px rgba(0,0,0,.7);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.side-panel.collapsed { transform: translateX(-380px); }
.side-panel::before {
  content: ''; position: absolute; inset: 0;
  pointer-events: none; z-index: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,115,85,0.02) 2px, rgba(139,115,85,0.02) 4px);
}

.panel-toggle {
  position: absolute; right: -44px; top: 20px;
  width: 44px; height: 44px;
  background: rgba(35,22,10,0.95);
  border: 2px solid rgba(196,162,101,0.35); border-left: none;
  border-radius: 0 10px 10px 0;
  color: #d4b896; font-size: 18px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.25s; z-index: 10;
}
.panel-toggle:hover { background: rgba(62,47,28,0.97); color: #e8d5b0; }

/* 面板头部 */
.panel-header {
  padding: 24px 24px 14px; position: relative; z-index: 1;
  flex-shrink: 0;
}
.panel-header .emblem { display: block; text-align: center; font-size: 32px; margin-bottom: 6px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
.panel-header h1 {
  font-family: 'Cinzel', 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 700; letter-spacing: 4px;
  color: #d4b896; text-align: center;
  text-shadow: 0 2px 8px rgba(0,0,0,.6); line-height: 1.5;
}
.panel-header .subtitle { display: block; font-family: 'Noto Serif SC', serif; font-size: 11px; letter-spacing: 5px; color: #a08060; margin-top: 2px; }

.rope-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 12px 0 0; color: #8b7355; font-size: 13px; z-index: 1; position: relative;
}
.rope-divider .rline {
  flex: 1; height: 2px;
  background: repeating-linear-gradient(90deg, #8b7355 0px, #8b7355 4px, transparent 4px, transparent 8px);
}

.info-strip {
  margin: 10px 20px 0; padding: 10px 14px;
  background: rgba(196,162,101,0.06);
  border: 1px solid rgba(139,115,85,0.25); border-radius: 6px;
  display: flex; justify-content: space-around; text-align: center;
  z-index: 1; position: relative; flex-shrink: 0;
}
.info-strip .is-item .is-num { font-family: 'Cinzel', serif; font-size: 20px; color: #c4a265; font-weight: 700; }
.info-strip .is-item .is-label { font-size: 10px; color: #8b7355; letter-spacing: 1px; }

/* ===== 地点列表视图 ===== */
.view-container {
  flex: 1; overflow-y: auto; position: relative; z-index: 1;
}
.view-container::-webkit-scrollbar { width: 4px; }
.view-container::-webkit-scrollbar-track { background: rgba(0,0,0,.3); }
.view-container::-webkit-scrollbar-thumb { background: #8b7355; border-radius: 2px; }

/* 列表视图 */
.list-view { display: block; }
.list-view.hidden { display: none; }

.loc-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 15px 24px; margin: 2px 12px;
  cursor: pointer; border-radius: 8px;
  transition: all 0.3s; border: 1px solid transparent; position: relative;
}
.loc-item:hover { background: rgba(196,162,101,0.08); border-color: rgba(139,115,85,0.2); }
.loc-item.active { background: rgba(196,162,101,0.15); border-color: rgba(196,162,101,0.4); box-shadow: 0 0 20px rgba(196,162,101,0.1); }
.loc-item .marker-icon { width: 40px; height: 40px; flex-shrink: 0; }
.loc-item .loc-info h3 { font-size: 14px; font-weight: 600; color: #e8d5b0; margin-bottom: 2px; letter-spacing: 0.5px; }
.loc-item.active .loc-info h3 { color: #c4a265; }
.loc-item .loc-info .loc-meta { font-size: 10px; color: #8b7355; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
.loc-item .loc-info .loc-desc { font-size: 11px; color: #a09070; margin-top: 5px; line-height: 1.6; }
.loc-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; box-shadow: 0 0 6px currentColor; }

/* ===== 详情卡片视图 ===== */
.detail-view { display: none; flex-direction: column; height: 100%; }
.detail-view.active { display: flex; }
.list-view.hidden ~ .detail-view { display: none; }

.detail-header-img {
  height: 160px; flex-shrink: 0;
  position: relative; overflow: hidden;
  margin: 0 16px; border-radius: 10px;
  border: 2px solid rgba(196,162,101,0.3);
}
.detail-header-img svg { width: 100%; height: 100%; }
.detail-header-img .detail-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 16px 14px;
  background: linear-gradient(transparent, rgba(30,15,5,0.9));
}
.detail-overlay h2 {
  font-family: 'Cinzel', 'Noto Serif SC', serif;
  font-size: 20px; color: #e8d5b0; letter-spacing: 2px;
  text-shadow: 0 2px 6px rgba(0,0,0,.7);
}
.detail-overlay .detail-loc { font-size: 11px; color: #c4a265; letter-spacing: 1px; margin-top: 2px; }

.detail-body {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.detail-body::-webkit-scrollbar { width: 4px; }
.detail-body::-webkit-scrollbar-track { background: rgba(0,0,0,.3); }
.detail-body::-webkit-scrollbar-thumb { background: #8b7355; border-radius: 2px; }

.detail-meta-row {
  display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
}
.detail-tag {
  font-size: 10px; padding: 4px 10px; border-radius: 12px;
  letter-spacing: 1px; border: 1px solid;
}
.detail-section-title {
  font-family: 'Cinzel', serif; font-size: 12px; color: #c4a265;
  letter-spacing: 2px; margin: 16px 0 8px;
  padding-bottom: 6px; border-bottom: 1px solid rgba(139,115,85,0.25);
}
.detail-desc {
  font-size: 12px; color: #c4b896; line-height: 1.9;
  text-align: justify;
}
.detail-desc em { color: #c4a265; font-style: normal; }

.detail-fact {
  display: flex; gap: 8px; padding: 8px 12px;
  background: rgba(196,162,101,0.05);
  border-left: 2px solid rgba(196,162,101,0.4);
  margin: 8px 0; border-radius: 0 6px 6px 0; font-size: 11px;
  color: #b8976e; line-height: 1.6;
}
.detail-fact .fact-icon { font-size: 16px; flex-shrink: 0; }

.detail-back-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 20px; margin: 0 20px 12px;
  background: rgba(196,162,101,0.08); border: 1px solid rgba(139,115,85,0.3);
  border-radius: 8px; color: #c4a265; font-size: 12px;
  letter-spacing: 1px; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.detail-back-btn:hover { background: rgba(196,162,101,0.15); color: #e8d5b0; }

/* ===== 面板底部 ===== */
.panel-footer {
  padding: 12px 24px; flex-shrink: 0;
  border-top: 1px solid rgba(139,115,85,0.25);
  font-size: 10px; color: #6b5a42;
  letter-spacing: 1px; text-align: center;
  line-height: 1.8; position: relative; z-index: 1;
}

/* ===== 浮动图例 ===== */
.float-legend {
  position: fixed; bottom: 28px; right: 28px;
  z-index: 1000; pointer-events: none;
  background: rgba(35,22,10,0.85); border: 1px solid rgba(196,162,101,0.3);
  border-radius: 10px; padding: 12px 16px;
  display: flex; gap: 14px; backdrop-filter: blur(4px);
}
.float-legend .leg-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #b8976e; }
.float-legend .leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ===== 弹窗 ===== */
.leaflet-popup-content-wrapper {
  background: linear-gradient(160deg, rgba(40,25,12,0.97), rgba(30,18,5,0.97)) !important;
  color: #e8d5b0 !important;
  border: 2px solid rgba(196,162,101,0.4) !important;
  border-radius: 12px !important;
  box-shadow: 0 12px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(139,115,85,0.2) inset !important;
  min-width: 240px;
}
.leaflet-popup-tip { background: rgba(40,25,12,0.97) !important; }
.leaflet-popup-content { font-family: 'Noto Serif SC', serif !important; margin: 14px 18px !important; line-height: 1.6; }
.leaflet-popup-content h3 { font-family: 'Cinzel', 'Noto Serif SC', serif; font-size: 17px; margin: 0 0 6px; color: #c4a265; letter-spacing: 1px; }
.leaflet-popup-content .pop-era { font-size: 11px; color: #8b7355; letter-spacing: 1px; margin-bottom: 8px; }
.leaflet-popup-content .pop-desc { font-size: 12px; color: #c4b896; line-height: 1.7; }
.leaflet-popup-close-button { color: #8b7355 !important; font-size: 20px !important; }

@keyframes needleSway { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(2deg)} 70%{transform:rotate(-1.5deg)} }

/* ===== 地图上的地标建筑图形 ===== */
.landmark-shape {
  pointer-events: none;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,.5));
  opacity: 0.65;
  transition: opacity 0.3s, filter 0.3s;
}
.landmark-shape:hover {
  opacity: 0.9;
  filter: drop-shadow(0 4px 14px rgba(196,162,101,0.5));
}
.landmark-shape svg {
  display: block;
}
.landmark-shape .bldg-body {
  fill: rgba(90,60,30,0.3);
  stroke: #c4a265;
  stroke-width: 1.2;
}
.landmark-shape .bldg-roof {
  fill: rgba(120,80,40,0.3);
  stroke: #c4a265;
  stroke-width: 1;
}
.landmark-shape .bldg-detail {
  fill: none;
  stroke: #c4a265;
  stroke-width: 0.6;
  opacity: 0.5;
}

/* 地标名称标签 */
.landmark-label {
  position: absolute;
  pointer-events: none;
  font-family: 'Noto Serif SC', serif;
  font-size: 10px;
  color: #e8d5b0;
  text-align: center;
  text-shadow: 0 1px 4px rgba(0,0,0,.8), 0 0 8px rgba(0,0,0,.5);
  white-space: nowrap;
  letter-spacing: 1px;
}

@media (max-width: 768px) {
  .side-panel { width: 300px; }
  .side-panel.collapsed { transform: translateX(-300px); }
  .panel-header h1 { font-size: 18px; }
  .loc-item { padding: 10px 16px; margin: 1px 8px; }
  .compass-rose { width: 80px; height: 80px; top: 10px; right: 10px; }
  .float-legend { bottom: 16px; right: 16px; gap: 8px; padding: 8px 12px; }
  .detail-header-img { height: 130px; margin: 0 10px; }
  .corner-tl, .corner-bl { left: 308px; }
}
</style>
</head>
<body>

<div class="noise-layer"></div>
<div id="map"></div>
<div class="parchment-overlay"></div>
<div class="map-border"></div>

<div class="corner-decor corner-tl">
  <svg viewBox="0 0 60 60"><path d="M0,50 Q0,0 50,0" fill="none" stroke="#c4a265" stroke-width="1.5" opacity="0.6"/><path d="M0,40 Q0,10 40,0" fill="none" stroke="#c4a265" stroke-width="0.8" opacity="0.3"/><circle cx="4" cy="4" r="2.5" fill="#c4a265" opacity="0.7"/></svg>
</div>
<div class="corner-decor corner-tr">
  <svg viewBox="0 0 60 60"><path d="M0,50 Q0,0 50,0" fill="none" stroke="#c4a265" stroke-width="1.5" opacity="0.6"/><path d="M0,40 Q0,10 40,0" fill="none" stroke="#c4a265" stroke-width="0.8" opacity="0.3"/><circle cx="4" cy="4" r="2.5" fill="#c4a265" opacity="0.7"/></svg>
</div>
<div class="corner-decor corner-bl">
  <svg viewBox="0 0 60 60"><path d="M0,50 Q0,0 50,0" fill="none" stroke="#c4a265" stroke-width="1.5" opacity="0.6"/><path d="M0,40 Q0,10 40,0" fill="none" stroke="#c4a265" stroke-width="0.8" opacity="0.3"/><circle cx="4" cy="4" r="2.5" fill="#c4a265" opacity="0.7"/></svg>
</div>
<div class="corner-decor corner-br">
  <svg viewBox="0 0 60 60"><path d="M0,50 Q0,0 50,0" fill="none" stroke="#c4a265" stroke-width="1.5" opacity="0.6"/><path d="M0,40 Q0,10 40,0" fill="none" stroke="#c4a265" stroke-width="0.8" opacity="0.3"/><circle cx="4" cy="4" r="2.5" fill="#c4a265" opacity="0.7"/></svg>
</div>

<div class="compass-rose">
  <svg viewBox="0 0 130 130">
    <defs><radialGradient id="cg" cx="50%" cy="45%"><stop offset="0%" stop-color="#e8d5b0"/><stop offset="50%" stop-color="#c4a265"/><stop offset="100%" stop-color="#6b5010"/></radialGradient></defs>
    <circle cx="65" cy="65" r="60" fill="none" stroke="url(#cg)" stroke-width="1.5" opacity="0.7"/>
    <circle cx="65" cy="65" r="56" fill="none" stroke="#c4a265" stroke-width="0.5" opacity="0.4"/>
    <g stroke="#c4a265" stroke-width="0.6" opacity="0.35">
      <line x1="65" y1="8" x2="65" y2="16"/><line x1="65" y1="114" x2="65" y2="122"/>
      <line x1="8" y1="65" x2="16" y2="65"/><line x1="114" y1="65" x2="122" y2="65"/>
      <line x1="25" y1="24" x2="31" y2="30"/><line x1="99" y1="24" x2="105" y2="30"/>
      <line x1="25" y1="106" x2="31" y2="100"/><line x1="99" y1="106" x2="105" y2="100"/>
    </g>
    <g fill="#d4b896" font-family="Cinzel,serif" font-size="12" text-anchor="middle">
      <text x="65" y="20" font-size="15" font-weight="bold" fill="#e8d5b0">N</text>
      <text x="65" y="118" opacity="0.5">S</text><text x="116" y="70" opacity="0.5">E</text><text x="14" y="70" opacity="0.5">W</text>
    </g>
    <g style="transform-origin:65px 65px;animation:needleSway 8s ease-in-out infinite;">
      <polygon points="65,12 58,60 65,48 72,60" fill="#e8d5b0" opacity="0.9"/>
      <polygon points="65,118 58,70 65,82 72,70" fill="#7a5a30" opacity="0.4"/>
    </g>
    <circle cx="65" cy="65" r="7" fill="#2a1508" stroke="#c4a265" stroke-width="1.5"/>
    <circle cx="65" cy="65" r="2" fill="#e8d5b0"/>
  </svg>
</div>

<div class="side-panel" id="sidePanel">
  <button class="panel-toggle" id="panelToggle" title="收起/展开">◀</button>

  <div class="panel-header">
    <span class="emblem">⚓</span>
    <h1>闽 南 侨 批 地 图<span class="subtitle">· QIAOPI MAP ·</span></h1>
    <div class="rope-divider"><span class="rline"></span><span>⛵</span><span class="rline"></span></div>

    <div class="detail-view" id="detailView">
      <div class="detail-header-img" id="detailHeaderImg"></div>

    </div>
  </div>

  <div class="panel-footer" id="panelFooter">
    天一总局 → 鼓浪屿 · 厦门 → 晋江 · 石狮 → 泉州古城 → 南安<br>
    <span style="color:#8b7355">漳州 · 厦门 · 泉州 — 海上丝绸之路记忆</span>

</div>

<div class="float-legend" id="floatLegend">
  <div class="leg-item"><span class="leg-dot" style="background:#5a8a9a;box-shadow:0 0 6px #5a8a9a"></span>侨批局</div>
  <div class="leg-item"><span class="leg-dot" style="background:#8b6914;box-shadow:0 0 6px #8b6914"></span>博物馆</div>
  <div class="leg-item"><span class="leg-dot" style="background:#b87333;box-shadow:0 0 6px #b87333"></span>展厅</div>
  <div class="leg-item"><span class="leg-dot" style="background:#6b8e5a;box-shadow:0 0 6px #6b8e5a"></span>村落/民居</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ==================== 丰富的地点数据 ====================
const locations = [
  {
    id: 1, name: '天一总局', fullName: '天一信局总办事处',
    lat: 24.505, lng: 117.925,
    city: '漳州', area: '龙海角美流传村',
    era: '清光绪六年（1880年）',
    icon: 'anchor', color: '#5a8a9a',

function createMarkerSVG(iconType, num, color) {
  const svgContent = iconSVGs[iconType] || iconSVGs.anchor;

function createLandmarkOverlay(loc) {
  const w = 160, h = 120;
  const shapeFn = landmarkShapes[loc.icon] || landmarkShapes.anchor;
  const shapeSvg = shapeFn(loc.color, w, h);

  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
    <defs><filter id="landGlow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <g filter="url(#landGlow)">
      <!-- 地基投影 -->
      <ellipse cx="${w/2}" cy="${h*0.78}" rx="${w*0.45}" ry="${h*0.05}" fill="#000" opacity="0.2"/>
      ${shapeSvg}
    </g>
  </svg>`;

  const icon = L.icon({
    iconUrl: 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr))),
    iconSize: [w, h],
    iconAnchor: [w/2, h*0.78],
    className: 'landmark-shape'
  });

  const marker = L.marker([loc.lat, loc.lng], {
    icon: icon,
    interactive: false,
    zIndexOffset: -100,
    keyboard: false
  }).addTo(map);

  // 名称标签（使用 divIcon 放在地标下方）
  const labelIcon = L.divIcon({
    className: 'landmark-label',
    html: `<div style="position:absolute;transform:translate(-50%,4px);">${loc.name}</div>`,
    iconSize: [0, 0],
    iconAnchor: [0, -h*0.78 + 6]
  });
  L.marker([loc.lat, loc.lng], {
    icon: labelIcon,
    interactive: false,
    zIndexOffset: -99,
    keyboard: false
  }).addTo(map);

  return marker;
}

        <rect x="50" y="2" width="6" height="35" fill="${c}" opacity="0.3"/>
        <polygon points="53,-2 44,6 62,6" fill="#e8d5b0" opacity="0.35"/>
      </g>
      <g transform="translate(200,60)">
        <path d="M0 40 Q30 10 60 15 Q90 8 120 20" fill="none" stroke="${c}" stroke-width="1.2" opacity="0.3" stroke-dasharray="5 4"/>
        <polygon points="55,15 50,25 60,25" fill="#e8d5b0" opacity="0.4">
          <animateTransform attributeName="transform" type="translate" values="0,0;3,0;0,0;0,0;0,0" dur="5s" repeatCount="indefinite"/>
        </polygon>
      </g>`
  };
  const scene = scenes[loc.icon] || scenes.anchor;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">${scene}</svg>`;
}

// ==================== 初始化地图 ====================
const map = L.map('map', {
  center: [24.7, 118.25], zoom: 10,
  minZoom: 9, maxZoom: 17,
  zoomControl: false, attributionControl: false
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

// ==================== 航线 ====================
const routeCoords = locations.map(l => [l.lat, l.lng]);
L.polyline(routeCoords, { color: '#c4a265', weight: 3.5, dashArray: '14 8', opacity: 0.85 }).addTo(map);
L.polyline(routeCoords, { color: '#8b7355', weight: 1.2, dashArray: '4 12', opacity: 0.35 }).addTo(map);
L.polyline(routeCoords, { color: '#e8d5b0', weight: 0.8, dashArray: '2 18', opacity: 0.25 }).addTo(map);

const lblStyle = 'background:rgba(30,16,5,0.85);color:#e8d5b0;padding:4px 12px;border-radius:14px;font-family:Cinzel,serif;font-size:11px;font-weight:bold;border:1.5px solid #c4a265;white-space:nowrap;backdrop-filter:blur(4px);';
L.marker([locations[0].lat, locations[0].lng], {
  icon: L.divIcon({ className: '', html: `<div style="${lblStyle}border-color:#e8d5b0;">⚓ 起点 · 天一总局</div>`, iconSize: [0,0], iconAnchor: [-60,14] })
}).addTo(map);
L.marker([locations[8].lat, locations[8].lng], {
  icon: L.divIcon({ className: '', html: `<div style="${lblStyle}">🏁 终点 · 蔡氏古民居</div>`, iconSize: [0,0], iconAnchor: [-65,14] })
}).addTo(map);

// ==================== 标记点 ====================
const markers = [];
locations.forEach((loc, i) => {
  const iconUrl = createMarkerSVG(loc.icon, i + 1, loc.color);
  const icon = L.icon({ iconUrl, iconSize: [44, 54], iconAnchor: [22, 48], popupAnchor: [0, -46] });
  const marker = L.marker([loc.lat, loc.lng], { icon })
    .bindPopup(`
      <h3>${loc.name}</h3>
      <div class="pop-era">📍 ${loc.city} · ${loc.area} ｜ ${loc.era}</div>
      <div class="pop-desc">${loc.desc.substring(0, 150)}…<br><small style="color:#c4a265">点击左侧列表查看完整介绍 →</small></div>
    `)
    .addTo(map);
  markers.push({ marker, loc, index: i });
  // 创建地标建筑图形
  createLandmarkOverlay(loc);
});

// ==================== 侧边栏列表 ====================
const listEl = document.getElementById('listView');
locations.forEach((loc, i) => {
  const div = document.createElement('div');
  div.className = 'loc-item';
  const sideIcon = createSideIconSVG(loc.icon, loc.color);
  const encoded = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(sideIcon)));
  div.innerHTML = `
    <img class="marker-icon" src="${encoded}" alt="${loc.name}">
    <div class="loc-info">
      <h3><span class="loc-dot" style="color:${loc.color};background:${loc.color}"></span> ${loc.name}</h3>
      <div class="loc-meta">📌 ${loc.city} · ${loc.area}</div>
      <div class="loc-desc">${loc.desc.substring(0, 48)}…</div>
    </div>`;
  div.addEventListener('click', () => { showDetail(i); });
  listEl.appendChild(div);
});

// ==================== 详情视图 ====================
const listView = document.getElementById('listView');
const detailView = document.getElementById('detailView');
const detailHeaderImg = document.getElementById('detailHeaderImg');
const detailBody = document.getElementById('detailBody');
const detailBackBtn = document.getElementById('detailBackBtn');
const panelFooter = document.getElementById('panelFooter');

function showDetail(idx) {
  const loc = locations[idx];
  setActiveItem(idx);

  // 插图/照片
  if (loc.photo) {
    detailHeaderImg.innerHTML = `
      <img src="${loc.photo}" alt="${loc.name}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <div style="display:none;">${createDetailIllustration(loc)}</div>
      <div class="detail-overlay">
        <h2>${loc.name}</h2>
        <div class="detail-loc">📍 ${loc.city} · ${loc.area}</div>
      </div>`;
  } else {
    detailHeaderImg.innerHTML = `
      ${createDetailIllustration(loc)}
      <div class="detail-overlay">
        <h2>${loc.name}</h2>
        <div class="detail-loc">📍 ${loc.city} · ${loc.area}</div>
      </div>`;
  }

  // 正文
  detailBody.innerHTML = `
    <div class="detail-meta-row">
      <span class="detail-tag" style="color:${loc.color};border-color:${loc.color};background:${loc.color}15">${loc.type}</span>
      <span class="detail-tag" style="color:#c4a265;border-color:#c4a265;background:rgba(196,162,101,0.08)">${loc.typeTag}</span>
      <span class="detail-tag" style="color:#8b7355;border-color:#8b7355;background:rgba(139,115,85,0.08)">${loc.era}</span>
    </div>

    <p class="detail-desc">${loc.desc}</p>
    <p class="detail-desc" style="margin-top:10px;">${loc.desc2}</p>
    <p class="detail-desc" style="margin-top:10px;">${loc.desc3}</p>

    <div class="detail-section-title">📋 关键信息</div>
    ${loc.facts.map(f => `<div class="detail-fact"><span class="fact-icon">✦</span>${f}</div>`).join('')}
  `;

  // 切换视图
  listView.style.display = 'none';
  detailView.style.display = 'flex';
  detailView.classList.add('active');
  panelFooter.style.display = 'none';

  // 地图跳转
  map.flyTo([loc.lat, loc.lng], 14, { duration: 1.2 });
  setTimeout(() => markers[idx].marker.openPopup(), 800);

  // 滚动到顶部
  document.getElementById('viewContainer').scrollTop = 0;
}

detailBackBtn.addEventListener('click', () => {
  listView.style.display = 'block';
  detailView.style.display = 'none';
  detailView.classList.remove('active');
  panelFooter.style.display = 'block';
  document.getElementById('viewContainer').scrollTop = 0;
});

function setActiveItem(idx) {
  document.querySelectorAll('.loc-item').forEach((el, i) => el.classList.toggle('active', i === idx));
}

// ==================== 面板折叠 ====================
const panel = document.getElementById('sidePanel');
const toggle = document.getElementById('panelToggle');
let panelOpen = true;
toggle.addEventListener('click', () => {
  panelOpen = !panelOpen;
  panel.classList.toggle('collapsed', !panelOpen);
  toggle.textContent = panelOpen ? '◀' : '▶';
  setTimeout(() => map.invalidateSize(), 400);
});

// ==================== 键盘导航 ====================
let currentIdx = -1;
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); currentIdx = Math.min(currentIdx + 1, locations.length - 1); }
  else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); currentIdx = Math.max(currentIdx - 1, 0); }
  else return;
  showDetail(currentIdx);
});

// ==================== 航船动画 ====================
const shipSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 36" width="48" height="36">
  <defs><filter id="sglow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter></defs>
  <g filter="url(#sglow)">
    <path d="M2 26 L8 30 L40 30 L46 26 L44 24 L4 24 Z" fill="#5a3e28" stroke="#c4a265" stroke-width="1.2"/>
    <polygon points="22,22 22,6 32,14" fill="#e8d5b0" stroke="#c4a265" stroke-width="0.8" opacity="0.85"/>
    <polygon points="18,22 18,10 10,16" fill="#d4c4a0" stroke="#c4a265" stroke-width="0.8" opacity="0.7"/>
    <line x1="22" y1="22" x2="22" y2="4" stroke="#8b7355" stroke-width="1.5"/>
    <line x1="18" y1="22" x2="18" y2="8" stroke="#8b7355" stroke-width="1.2"/>
    <circle cx="4" cy="25" r="1.8" fill="#c4a265"/>
    <polygon points="22,4 22,0 28,3" fill="#8b6914" stroke="#e8d5b0" stroke-width="0.5"/>
  </g></svg>`;

const shipIcon = L.icon({
  iconUrl: 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(shipSVG))),
  iconSize: [48, 36], iconAnchor: [24, 30]
});

function getPathLength(coords) {
  let total = 0;
  for (let i = 1; i < coords.length; i++) {
    const a = coords[i-1], b = coords[i];
    total += Math.sqrt((b[0]-a[0])**2 + (b[1]-a[1])**2);
  }
  return total;
}
function interpolateAlongPath(coords, t) {
  const totalLen = getPathLength(coords);
  let target = t * totalLen, acc = 0;
  for (let i = 1; i < coords.length; i++) {
    const a = coords[i-1], b = coords[i];
    const seg = Math.sqrt((b[0]-a[0])**2 + (b[1]-a[1])**2);
    if (acc + seg >= target) {
      const st = (target - acc) / seg;
      return [a[0]+(b[0]-a[0])*st, a[1]+(b[1]-a[1])*st];
    }
    acc += seg;
  }
  return coords[coords.length-1];
}
function getBearingAt(coords, t) {
  const totalLen = getPathLength(coords);
  let target = t * totalLen, acc = 0;
  for (let i = 1; i < coords.length; i++) {
    const a = coords[i-1], b = coords[i];
    const seg = Math.sqrt((b[0]-a[0])**2 + (b[1]-a[1])**2);
    if (acc + seg >= target) {
      return Math.atan2(b[1]-a[1], b[0]-a[0]) * (180/Math.PI);
    }
    acc += seg;
  }
  return 0;
}

const shipMarker = L.marker([locations[0].lat, locations[0].lng], {
  icon: shipIcon, zIndexOffset: 1000
}).addTo(map);

const wakeMarkers = [];
for (let w = 0; w < 5; w++) {
  const wi = L.divIcon({
    className: '',
    html: `<div style="width:${6-w}px;height:${6-w}px;border-radius:50%;background:rgba(196,162,101,${0.5-w*0.08});"></div>`,
    iconSize: [6,6], iconAnchor: [3,3]
  });
  wakeMarkers.push(L.marker([0,0], { icon: wi, interactive: false, zIndexOffset: 900+w }).addTo(map));
}

let shipT = 0, shipPaused = false, pauseTimer = null;
function animateShip() {
  if (!shipPaused) {
    shipT += 0.0005;
    if (shipT > 1) shipT = 0;
    const pos = interpolateAlongPath(routeCoords, shipT);
    const bearing = getBearingAt(routeCoords, shipT);
    shipMarker.setLatLng(pos);
    const el = shipMarker.getElement();
    if (el) {
      const img = el.querySelector('img') || el;
      img.style.transform = `rotate(${bearing}deg)`;
      img.style.transformOrigin = 'center center';
      img.style.transition = 'transform 0.3s ease';
    }
    for (let w = 0; w < wakeMarkers.length; w++) {
      wakeMarkers[w].setLatLng(interpolateAlongPath(routeCoords, Math.max(0, shipT - (w+1)*0.004)));
    }
    for (let i = 0; i < locations.length; i++) {
      const st = i / (locations.length-1);
      if (Math.abs(shipT - st) < 0.003 && Math.abs(shipT - st) > 0.0001) {
        shipPaused = true;
        setActiveItem(i);
        markers[i].marker.openPopup();
        clearTimeout(pauseTimer);
        pauseTimer = setTimeout(() => { shipPaused = false; markers[i].marker.closePopup(); }, 2500);
        break;
      }
    }
  }
  requestAnimationFrame(animateShip);
}
requestAnimationFrame(animateShip);

// ==================== 响应式 & 初始设置 ====================
window.addEventListener('resize', () => map.invalidateSize());
const bounds = L.latLngBounds(routeCoords);
map.fitBounds(bounds.pad(0.12));

document.querySelector('.compass-rose').style.pointerEvents = 'auto';
document.querySelector('.compass-rose').style.cursor = 'pointer';
document.querySelector('.compass-rose').title = '点击回到全览视图';
document.querySelector('.compass-rose').addEventListener('click', () => {
  map.flyToBounds(bounds.pad(0.12), { duration: 1 });
});

console.log('⚓ 闽南侨批地图 v3 · 9站点 · 详情卡片 · 航船巡游');
</script>
</body>
